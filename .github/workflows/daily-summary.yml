name: Daily Summary

on:
  schedule:
    # 自动定时：北京时间每天上午 10:00 (对应 UTC 02:00)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 保留手动按钮，方便您随时想看即刻运行
    inputs:
      hours:
        description: '回溯小时数'
        required: false
        default: '24'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 运行环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装程序核心组件
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: AI 抓取并生成简报
        run: horizon --hours ${{ github.event.inputs.hours || '24' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 自动生成精美首页 (解决 404 问题)
        run: |
          mkdir -p web_dist
          # 寻找最新生成的 .md 简报文件
          LATEST_FILE=$(ls -t data/summaries/*.md | head -n 1)
          if [ -f "$LATEST_FILE" ]; then
            # 将最新的简报复制为 index.md，这样打开网址直接就能看到内容
            cp "$LATEST_FILE" web_dist/index.md
            # 同时保留所有历史记录供查阅
            cp data/summaries/*.md web_dist/
          else
            echo "No summaries found today."
            echo "今日无重大合规或资本市场更新。" > web_dist/index.md
          fi

      - name: 发布至专属网页
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web_dist
          publish_branch: gh-pages
