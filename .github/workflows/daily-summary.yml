name: Daily Summary

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      hours:
        description: 'Fetch content from the last X hours'
        required: false
        default: '168'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Horizon
        run: horizon --hours ${{ github.event.inputs.hours || '168' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 核心改动：直接将存放简报的文件夹发布为网页
          publish_dir: ./data/summaries
          publish_branch: gh-pages
