name: Daily Summary

on:
  schedule:
    # 每天北京时间 10:00 运行 (UTC 02:00)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      hours:
        description: 'Fetch content from the last X hours'
        required: false
        default: '24'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync

      - name: Run Horizon
        run: uv run horizon --hours ${{ github.event.inputs.hours || '168' }}
        env:
          # 这一行确保程序能从 GitHub Secrets 保险箱拿到你的 DeepSeek 钥匙
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 如果你的 config.json 里用了 OPENAI_API_KEY 也可以同时指向这个 secret
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Deploy to GitHub Pages
        # 只有在抓取到内容并生成了 summaries 时才运行发布
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 强制将生成的 summaries 和静态网页提交到 gh-pages 分支
          uv run horizon-build-dist
          npx gh-pages -d dist -u "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
