name: Daily Summary

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      hours:
        description: 'Fetch content from the last X hours'
        required: false
        default: '168'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install gh-pages

      - name: Run Horizon
        run: horizon --hours ${{ github.event.inputs.hours || '168' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Deploy to GitHub Pages
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 使用 python 直接运行构建脚本，避开找不到命令的问题
          python -m horizon.builder || echo "Builder failed, trying alternative..."
          # 如果项目结构不同，尝试直接发布生成的 data 目录或默认 dist
          mkdir -p dist
          cp -r data/summaries/* dist/ 2>/dev/null || true
          npx gh-pages -d data/summaries -u "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
