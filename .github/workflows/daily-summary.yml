name: Daily Summary

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      hours:
        description: '回溯小时数'
        required: false
        default: '168'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装核心组件
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install markdown

      - name: AI 抓取并生成简报
        run: horizon --hours ${{ github.event.inputs.hours || '168' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 转换为标准网页 (解决 404 顽疾)
        run: |
          mkdir -p web_dist
          LATEST_FILE=$(ls -t data/summaries/*.md | head -n 1)
          if [ -f "$LATEST_FILE" ]; then
            # 将最新的 Markdown 转换为标准的 index.html 网页
            echo "<html><head><meta charset='utf-8'><title>每日金融法律简报</title><style>body{font-family:sans-serif;line-height:1.6;max-width:800px;margin:40px auto;padding:0 20px;color:#333;}h1,h2{color:#1a5a96;}</style></head><body>" > web_dist/index.html
            python -m markdown "$LATEST_FILE" >> web_dist/index.html
            echo "</body></html>" >> web_dist/index.html
            # 同时保留原始 md 文件备查
            cp data/summaries/*.md web_dist/
          else
            echo "<html><body><h1>今日无重大更新</h1></body></html>" > web_dist/index.html
          fi

      - name: 发布至专属网页
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web_dist
          publish_branch: gh-pages
