name: Daily Summary

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      hours:
        description: 'Fetch content from the last X hours'
        required: false
        default: '168'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Horizon
        run: horizon --hours ${{ github.event.inputs.hours || '168' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Create Index Page
        run: |
          # 自动把最新的那份简报复制一份作为首页，解决 404 问题
          mkdir -p web_dist
          cp data/summaries/*.md web_dist/
          LATEST_FILE=$(ls -t data/summaries/*.md | head -n 1)
          cp "$LATEST_FILE" web_dist/index.md
          # 创建一个简单的 HTML 引导，防止某些浏览器不识别 .md
          echo "Your legal intelligence report is ready. If not redirected, click the files below." > web_dist/README.txt

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web_dist
          publish_branch: gh-pages
